name: Deploy to GitHub Pages

# Runs on every push to main, and on manual trigger.
# Builds the search + TOC indexes, regenerates icons if missing, and
# publishes the repository to GitHub Pages. No Jekyll is involved.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow (only for icon generation)
        run: pip install --quiet Pillow

      - name: Generate icons if missing
        run: |
          if [ ! -f assets/img/icon-192.png ]; then
            python tools/make_icons.py
          fi

      - name: Build indexes
        run: python tools/build.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
